---

- database: Postgres
  table_list: SELECT table_name FROM information_schema.tables  WHERE table_schema = 'public'
  table_cardinality: SELECT count(*) FROM {};
  table_schema: SELECT column_name, data_type FROM information_schema.columns WHERE table_name = '{}'
  table_indexes: SELECT indexdef FROM pg_indexes WHERE tablename = '{}';
  table_PK_FK: |
    SELECT
      tc.table_name,
      kcu.column_name,
      ccu.table_name AS foreign_table_name,
      ccu.column_name AS foreign_column_name,
      tc.constraint_type
    FROM information_schema.table_constraints AS tc
        JOIN information_schema.key_column_usage AS kcu ON tc.constraint_name = kcu.constraint_name
        AND tc.table_schema = kcu.table_schema JOIN information_schema.constraint_column_usage AS ccu
        ON ccu.constraint_name = tc.constraint_name
    WHERE (tc.constraint_type = 'PRIMARY KEY' OR tc.constraint_type = 'FOREIGN KEY')
      AND tc.table_schema='public'
      AND tc.table_name='{}';
  table_profile: SELECT {} FROM {};
  central_table: |
    WITH inbound AS (
      SELECT
        con.confrelid AS table_oid,
        COUNT(*) AS inbound_fks
      FROM
        pg_constraint con
        JOIN pg_class ref_tbl ON ref_tbl.oid = con.confrelid
      WHERE
        con.contype = 'f'
        AND ref_tbl.relkind = 'r'
      GROUP BY con.confrelid
    ),
    outbound AS (
      SELECT
        con.conrelid AS table_oid,
        COUNT(*) AS outbound_fks
      FROM
        pg_constraint con
        JOIN pg_class base_tbl ON base_tbl.oid = con.conrelid
      WHERE
        con.contype = 'f'
        AND base_tbl.relkind = 'r'
      GROUP BY con.conrelid
    )
    SELECT
      n.nspname AS schema_name,
      c.relname AS table_name,
      COALESCE(i.inbound_fks, 0) AS inbound_fks,
      COALESCE(o.outbound_fks, 0) AS outbound_fks
    FROM
      pg_class c
      JOIN pg_namespace n ON n.oid = c.relnamespace
      LEFT JOIN inbound i ON c.oid = i.table_oid
      LEFT JOIN outbound o ON c.oid = o.table_oid
    WHERE
      c.relkind = 'r'
      AND n.nspname NOT IN ('pg_catalog', 'information_schema')
      AND c.relname IN ( {})
    ORDER BY
      inbound_fks DESC,
      outbound_fks ASC
    LIMIT 1;
